apiVersion: camel.apache.org/v1
kind: Integration
metadata:
  name: clientsend-service
  namespace: pdf-integration
spec:
  traits:
    service:
      enabled: true
      type: ClusterIP
      port: 8080
    prometheus:
      enabled: true
    platform-http:
      open-api:
        enabled: true
        base-path: /api

  dependencies:
  - camel:prometheus
  - camel:mail
  - camel:sftp
  - camel:http

  flows:
  - from:
      uri: "platform-http:/send/{clientId}"
      steps:
      - log: "Envoi document au client ${header.clientId}"

      # Lecture préférences client (mock)
      - set-property:
          name: clientChannel
          simple: "EMAIL" # EMAIL | SFTP | API

      - choice:
          when:
          - simple: "${exchangeProperty.clientChannel} == 'EMAIL'"
            steps:
            - to: "smtp://smtp.server.com?username=user&password=pass&from=integration@example.com&to=${header.clientId}@client.com&subject=Document signé"
          - simple: "${exchangeProperty.clientChannel} == 'SFTP'"
            steps:
            - to: "sftp://client-sftp/${header.clientId}?username=user&password=pass"
          - simple: "${exchangeProperty.clientChannel} == 'API'"
            steps:
            - set-header:
                name: CamelHttpMethod
                constant: POST
            - set-header:
                name: Content-Type
                constant: application/pdf
            - toD: "http://external-api-service/send/${header.clientId}"

      - log: "Document envoyé avec succès"

      - to: "direct:observability"
  - from:
    uri: "direct:observability"
    steps:
    - set-header:
        name: CamelPrometheusMetricsName
        constant: "pdf_integration_clientsend_total"
    - to: "prometheus:counter"
