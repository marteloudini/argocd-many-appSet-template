apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
- target:
    kind: Integration
  patch: |-
    - op: replace
      path: /metadata/namespace
      value: pdf-integration-staging
- target:
    name: camel-config
    kind: ConfigMap
  patch: |-
    - op: replace
      path: /metadata/namespace
      value: pdf-integration-staging
